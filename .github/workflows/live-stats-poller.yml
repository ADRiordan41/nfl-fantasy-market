name: Live Stats Poller

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

concurrency:
  group: live-stats-poller
  cancel-in-progress: true

jobs:
  poll-live-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    env:
      API_BASE: ${{ vars.LIVE_POLLER_API_BASE || 'https://matchupmarket.onrender.com' }}
      SPORT: ${{ vars.LIVE_POLLER_SPORT || 'MLB' }}
      WEEK: ${{ vars.LIVE_POLLER_WEEK || '1' }}
      LIVE_ONLY: ${{ vars.LIVE_POLLER_MLB_LIVE_ONLY || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate configuration
        env:
          POLLER_USERNAME: ${{ secrets.LIVE_POLLER_USERNAME }}
          POLLER_PASSWORD: ${{ secrets.LIVE_POLLER_PASSWORD }}
        run: |
          if [ -z "$POLLER_USERNAME" ] || [ -z "$POLLER_PASSWORD" ]; then
            echo "Missing required secrets LIVE_POLLER_USERNAME and/or LIVE_POLLER_PASSWORD." >&2
            exit 1
          fi
          echo "Using API_BASE=$API_BASE SPORT=$SPORT WEEK=$WEEK LIVE_ONLY=$LIVE_ONLY"

      - name: Authenticate poller user
        id: auth
        env:
          POLLER_USERNAME: ${{ secrets.LIVE_POLLER_USERNAME }}
          POLLER_PASSWORD: ${{ secrets.LIVE_POLLER_PASSWORD }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          api_base = os.environ["API_BASE"].rstrip("/")
          username = os.environ.get("POLLER_USERNAME", "").strip()
          password = os.environ.get("POLLER_PASSWORD", "").strip()
          if not username or not password:
            print("Missing poller credentials in secrets.", file=sys.stderr)
            raise SystemExit(1)

          payload = json.dumps({"username": username, "password": password}).encode("utf-8")
          req = urllib.request.Request(
              f"{api_base}/auth/login",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as response:
                  body = json.loads(response.read().decode("utf-8"))
          except Exception as exc:
              print(f"Auth login failed: {exc}", file=sys.stderr)
              raise SystemExit(1)

          token = str(body.get("access_token", "")).strip()
          if not token:
              print("Auth login response did not include access_token.", file=sys.stderr)
              raise SystemExit(1)

          print(f"::add-mask::{token}")
          output_path = os.environ.get("GITHUB_OUTPUT")
          if not output_path:
              print("GITHUB_OUTPUT is not set.", file=sys.stderr)
              raise SystemExit(1)
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"access_token={token}\n")
          PY

      - name: Poll MLB StatsAPI once
        env:
          ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          cmd=(python backend/scripts/live_stats_poller.py
            --source-provider mlb-statsapi
            --sport "$SPORT"
            --week "$WEEK"
            --api-base "$API_BASE"
            --token "$ACCESS_TOKEN"
            --once
          )
          if [ "${LIVE_ONLY,,}" = "true" ] || [ "$LIVE_ONLY" = "1" ]; then
            cmd+=(--mlb-live-only)
          fi
          "${cmd[@]}"

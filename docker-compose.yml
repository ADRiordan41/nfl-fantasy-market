services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fantasy
      POSTGRES_PASSWORD: fantasy
      POSTGRES_DB: fantasy_market
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fantasy -d fantasy_market"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build: ./backend
    env_file:
      - ./.env
    command:
      - sh
      - -c
      - >
        uvicorn app.main:app
        --host 0.0.0.0
        --port $${PORT:-8000}
        --reload
        --reload-dir /app/app
        --timeout-keep-alive $${UVICORN_TIMEOUT_KEEP_ALIVE:-10}
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./backend/scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
